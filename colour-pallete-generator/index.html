<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Pallete Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Colour Pallete Generator</h1>

        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Pallete
        </button>

        <div class="pallete-container">
            <!-- COLOUR BOX 1 -->
            <div class="colour-box">
                <div class="colour" style="background-color: #e1f5fe;"></div>
                <div class="colour-info">
                    <span class="hex-value">#E1F5FE</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            
            <!-- COLOUR BOX 2 -->
            <div class="colour-box">
                <div class="colour" style="background-color: #b3e5fc;"></div>
                <div class="colour-info">
                    <span class="hex-value">#B3E5FC</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            
            <!-- COLOUR BOX 3 -->
            <div class="colour-box">
                <div class="colour" style="background-color: #81d4fa;"></div>
                <div class="colour-info">
                    <span class="hex-value">#81D4FA</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            
            
            <!-- COLOUR BOX 4 -->
            <div class="colour-box">
                <div class="colour" style="background-color: #4fc3f7;"></div>
                <div class="colour-info">
                    <span class="hex-value">#4FC3F7</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>
            
            <!-- COLOUR BOX 5 -->
            <div class="colour-box">
                <div class="colour" style="background-color: #29b6f6;"></div>
                <div class="colour-info">
                    <span class="hex-value">#29B6F6</span>
                    <i class="far fa-copy copy-btn" title="Copy to clipboard"></i>
                </div>
            </div>

        </div>
    </main>


    <script src="script.js"></script>
</body>
</html>
