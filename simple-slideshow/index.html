<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body 
    style="padding: 0px 20px; box-sizing: border-box; 
        margin: 0; display: flex; flex-direction: column; align-items: center; 
        justify-content: center; height: 100vh; 
        background-color: papayawhip; font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;"
>
    <h2 style="color:brown;">SlideShow</h2>
    <div style="color: burlywood; display: flex; align-items: center; gap: 10px;">
        <span id="left" style="font-size: 30px; cursor: pointer;">&lt</span> 
        <img name="slide" alt="slideshow-image" width="500">
        <span id="right" style="font-size: 30px; cursor: pointer; :hover {color: red}">&gt</span>
    </div>
</body>
</html>


<script>

    let i = 0;
    let timeoutId = null;
    const timeFrame = 3000;
    const images = [
        "images/image1.jpg", 
        "images/image2.jpg", 
        "images/image3.jpg", 
        "images/image4.jpg",
        "images/image5.jpg",
        "images/image6.jpg",
        "images/image7.jpg"
    ];

    function handleLeftArrow() {
        clearTimeout(timeoutId)
        i--
        if (i < 0) {
            i = images.length - 1;
        }
        document.slide.src = images[i]

        timeoutId = setTimeout(handleSlideShow, timeFrame);
    };

    function handleRightArrow() {
        clearTimeout(timeoutId)
        i++
        i = i % images.length
        document.slide.src = images[i]

        timeoutId = setTimeout(handleSlideShow, timeFrame);
    };

    function handleSlideShow() {
        document.slide.src = images[i];
        if (i < images.length - 1) {
            i++
        } else {
            i = 0;
        }
        timeoutId = setTimeout(handleSlideShow, timeFrame);
    }

    window.onload = handleSlideShow;

    document.getElementById("left").addEventListener("click", () => handleLeftArrow())
    document.getElementById("right").addEventListener("click", () => handleRightArrow())
    


</script>
