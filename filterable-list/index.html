<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Contacts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

</head>
<body>
    <div class="container">
        <h1 class="center-align">My Contacts</h1>
        <input type="text" id="filter-input" placeholder="Search Names...">
        <ul id="names" class="collection with-header">
            <li class="collection-header">
                <h5>A</h5>
            </li>
            <li class="collection-item">
                <a href="#">Abe</a>
            </li>
            <li class="collection-item">
                <a href="#">Adam</a>
            </li>
            <li class="collection-item">
                <a href="#">Alan</a>
            </li>
            <li class="collection-item">
                <a href="#">Anna</a>
            </li>
            <li class="collection-item">
                <a href="#">Adele</a>
            </li>
            
            <li class="collection-header">
                <h5>B</h5>
            </li>
            <li class="collection-item">
                <a href="#">Bill</a>
            </li>
            <li class="collection-item">
                <a href="#">Bob</a>
            </li>
            <li class="collection-item">
                <a href="#">Bella</a>
            </li>
            <li class="collection-item">
                <a href="#">Belle</a>
            </li>
            <li class="collection-item">
                <a href="#">Britney</a>
            </li>

            <li class="collection-header">
                <h5>C</h5>
            </li>
            <li class="collection-item">
                <a href="#">Carrie</a>
            </li>
            <li class="collection-item">
                <a href="#">Cathy</a>
            </li>
            <li class="collection-item">
                <a href="#">Catherine</a>
            </li>
            <li class="collection-item">
                <a href="#">Cain</a>
            </li>
            <li class="collection-item">
                <a href="#">Carol</a>
            </li>
            
            <li class="collection-header">
                <h5>D</h5>
            </li>
            <li class="collection-item">
                <a href="#">Dennis</a>
            </li>
            <li class="collection-item">
                <a href="#">Dean</a>
            </li>
            <li class="collection-item">
                <a href="#">Daisy</a>
            </li>
            <li class="collection-item">
                <a href="#">Doris</a>
            </li>
            <li class="collection-item">
                <a href="#">Dan</a>
            </li>

        </ul>
    </div>

    <script>
        let filterInputEl = document.getElementById("filter-input");

        let li = document.querySelectorAll("#names li");

        filterInputEl.addEventListener("input", function () {
            const filterValue = filterInputEl.value.toLowerCase();

            let currentHeader = null;
            let nameVisibleUnderHeader = false; 

            li.forEach(item => {
                if (item.classList.contains("collection-header")) {
                    if (currentHeader && !nameVisibleUnderHeader) {
                        currentHeader.style.display = "none";
                    };

                    currentHeader = item;
                    nameVisibleUnderHeader = false;
                    item.style.display = "";
                } else {
                    const match = item.textContent.toLowerCase().includes(filterValue);
                    item.style.display = match ? "" : "none"
                    
                    if (match) {
                        nameVisibleUnderHeader = true
                    }
                }
            })

            if (currentHeader && !nameVisibleUnderHeader) {
                currentHeader.style.display = "none";
            }
        });
    </script>
</body>
</html>
